
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aletheia | Multi-Agent Simulation</title>
  <meta name="description" content="An autonomous multi-agent simulation environment for observing emergent LLM behaviors and complex dialogue loops.">
  <meta name="theme-color" content="#0b1324">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg-ink: #05070f;
      --bg-deep: #0b1324;
      --surface: #121a2f;
      --surface-2: #0f1628;
      --edge: rgba(255, 255, 255, 0.08);
      --text-main: #e4e9f6;
      --text-subtle: rgba(196, 210, 236, 0.66);
      --accent: #5dd4ff;
      --accent-2: #f0b35b;
      --success: #41d9a8;
    }
    html, body {
      height: 100%;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: radial-gradient(circle at top, rgba(93, 212, 255, 0.08), transparent 45%),
        radial-gradient(circle at 20% 20%, rgba(240, 179, 91, 0.08), transparent 40%),
        var(--bg-ink);
      color: var(--text-main);
      min-height: 100vh;
    }
    .mono {
      font-family: 'IBM Plex Mono', monospace;
    }
    #root {
      height: 100%;
    }
    .glass-panel {
      background: linear-gradient(160deg, rgba(18, 26, 47, 0.92), rgba(8, 12, 24, 0.85));
      border: 1px solid var(--edge);
      box-shadow: 0 24px 50px rgba(6, 10, 20, 0.45);
    }
    .fade-slide-in {
      animation: fadeSlideIn 320ms ease-out;
    }
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0b0f1b;
    }
    ::-webkit-scrollbar-thumb {
      background: #283150;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3a4466;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(93, 212, 255, 0.35);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(93, 212, 255, 0.55);
    }
    .scroll-region {
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body class="overflow-hidden">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
